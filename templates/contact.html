<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | CyberShield</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

.contact{
width:80%;
max-width:700px;
margin:60px auto;
background:#101827;
padding:40px;
border-radius:15px;
}

.contact h1{
text-align:center;
color:#00e5ff;
margin-bottom:30px;
}

.contact input,
.contact textarea{

width:100%;
padding:15px;
margin:12px 0;
background:#1a2238;
color:white;
border:1px solid #00e5ff;
border-radius:8px;
outline:none;

}

.contact textarea{
height:150px;
resize:none;
}

.contact button{

width:100%;
padding:15px;
background:#00e5ff;
border:none;
font-size:18px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
transition:.3s;

}

.contact button:hover{

background:#00b8d4;

}

</style>

</head>

<body>

<nav>

<div class="logo">🛡 CyberShield</div>

<ul>

<li><a href="/">Home</a></li>
<li><a href="/scanner">Scanner</a></li>
<li><a href="/dashboard">Dashboard</a></li>
<li><a href="/tips">Tips</a></li>
<li><a href="/about">About</a></li>
<li><a href="/developer">Developer</a></li>
<li><a href="/contact">Contact</a></li>

</ul>

</nav>

<div class="contact">

<h1>Contact Us</h1>

<form>

<input type="text" placeholder="Enter Your Name">

<input type="email" placeholder="Enter Your Email">

<textarea placeholder="Write Your Message"></textarea>

<button type="submit">

Send Message

</button>

</form>

</div>

</body>

</html>
