<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield | Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

.dashboard{
    width:90%;
    margin:50px auto;
}

.dashboard h1{
    text-align:center;
    margin-bottom:40px;
    color:#00e5ff;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.box{
    background:#101827;
    padding:30px;
    border-radius:12px;
    text-align:center;
    transition:.3s;
    border:1px solid #1f2937;
}

.box:hover{
    transform:translateY(-8px);
    box-shadow:0 0 20px #00e5ff;
}

.box h2{
    color:#00e5ff;
    margin-bottom:15px;
}

.box p{
    font-size:20px;
}

</style>

</head>

<body>

<nav>

<div class="logo">
🛡 CyberShield
</div>

<ul>
<li><a href="/">Home</a></li>
<li><a href="/scanner">Scanner</a></li>
<li><a href="/dashboard">Dashboard</a></li>
<li><a href="/tips">Tips</a></li>
<li><a href="/about">About</a></li>
<li><a href="/developer">Developer</a></li>
<li><a href="/contact">Contact</a></li>
</ul>

</nav>

<div class="dashboard">

<h1>Cyber Security Dashboard</h1>

<div class="stats">

<div class="box">
<h2>🛡 Security Rules</h2>
<p>10 Active Checks</p>
</div>

<div class="box">
<h2>🔍 URL Scanner</h2>
<p>Ready</p>
</div>

<div class="box">
<h2>⚠ Risk Levels</h2>
<p>Safe / Medium / High</p>
</div>

<div class="box">
<h2>🔒 HTTPS Check</h2>
<p>Enabled</p>
</div>

<div class="box">
<h2>🌐 IP Detection</h2>
<p>Enabled</p>
</div>

<div class="box">
<h2>🚨 Phishing Keywords</h2>
<p>Enabled</p>
</div>

</div>

</div>

</body>
</html>
